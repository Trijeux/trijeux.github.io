<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Algorithm Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1a;color:#e0e8ff;font-family:'Rajdhani',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:14px;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(0,200,255,.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(80,0,255,.05) 0%,transparent 60%);}
h1{font-family:'Share Tech Mono',monospace;font-size:1.1rem;letter-spacing:.2em;color:#00d4ff;
  text-transform:uppercase;margin-bottom:2px;text-shadow:0 0 20px rgba(0,212,255,.5);}
.subtitle{font-size:.78rem;color:#4a6080;letter-spacing:.08em;margin-bottom:10px;font-weight:300;}

.tab-bar{display:flex;gap:0;margin-bottom:12px;border:1px solid #1a2a40;border-radius:7px;
  overflow:hidden;flex-wrap:wrap;max-width:1100px;width:100%;}
.tab-btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  padding:8px 14px;border:none;background:#0d1220;color:#3a5a7a;cursor:pointer;
  transition:all .18s;white-space:nowrap;flex:1;}
.tab-btn:hover{color:#7ab3ff;background:#0f1e30;}
.tab-btn.t-dijk {border-bottom:2px solid transparent;}
.tab-btn.t-dijk.on{background:#001e38;color:#00d4ff;border-bottom-color:#00d4ff;}
.tab-btn.t-ff.on{background:#160826;color:#cc88ff;border-bottom-color:#cc88ff;}
.tab-btn.t-bfs.on{background:#002010;color:#00dd88;border-bottom-color:#00dd88;}
.tab-btn.t-dfs.on{background:#1e1200;color:#ffaa22;border-bottom-color:#ffaa22;}
.tab-btn.t-kru.on{background:#001828;color:#44ccff;border-bottom-color:#44ccff;}
.tab-btn.t-pri.on{background:#0e1800;color:#88ff44;border-bottom-color:#88ff44;}
.tab-btn.t-bfn.on{background:#200808;color:#ff6666;border-bottom-color:#ff6666;}
.tab-btn.t-top.on{background:#1a0020;color:#dd88ff;border-bottom-color:#dd88ff;}

.section{display:none;width:100%;max-width:1100px;flex-direction:column;align-items:center;}
.section.on{display:flex;}

.mode-bar{display:flex;gap:4px;margin-bottom:10px;background:#0d1220;border:1px solid #1a2a40;
  border-radius:6px;padding:4px;flex-wrap:wrap;justify-content:center;}
.mode-btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.06em;
  padding:4px 10px;border:1px solid transparent;border-radius:4px;
  background:transparent;color:#3a5a7a;cursor:pointer;transition:all .15s;}
.mode-btn:hover{color:#7ab3ff;border-color:#2a4a6a;}
.mode-btn.on{background:#002a4a;border-color:#00d4ff;color:#00d4ff;}
.mode-btn.edit-on{background:#1a2a00;border-color:#aadd00;color:#aadd00;}

.layout{display:flex;gap:12px;align-items:flex-start;width:100%;flex-wrap:wrap;}
canvas{background:#0d1220;border:1px solid #1a2a40;border-radius:8px;
  box-shadow:0 0 30px rgba(0,100,200,.1);flex-shrink:0;display:block;}

.panel{background:#0d1220;border:1px solid #1a2a40;border-radius:8px;
  padding:12px;min-width:200px;flex-shrink:0;}
.panel h2{font-family:'Share Tech Mono',monospace;font-size:.68rem;
  letter-spacing:.14em;margin-bottom:8px;border-bottom:1px solid #1a2a40;padding-bottom:5px;}
.h-dijk{color:#00d4ff;} .h-ff{color:#cc88ff;} .h-bfs{color:#00dd88;}
.h-dfs{color:#ffaa22;} .h-kru{color:#44ccff;} .h-pri{color:#88ff44;}
.h-bfn{color:#ff6666;} .h-top{color:#dd88ff;}

.gen-table{width:100%;border-collapse:collapse;}
.gen-table td{font-family:'Share Tech Mono',monospace;font-size:.73rem;padding:2px 4px;border-bottom:1px solid #111827;}
.gen-table td:first-child{color:#7ab3ff;}
.gen-table td:last-child{color:#f0f4ff;text-align:right;}
.gen-table tr.cur td{color:#00d4ff;background:rgba(0,212,255,.07);}
.gen-table tr.vis td{color:#2a5a2a;}
.gen-table tr.vis td:first-child{color:#2a8a2a;}
.gen-table tr.neg td{color:#ff4444;}

button{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.78rem;
  letter-spacing:.06em;padding:5px 10px;border:1px solid #1a3a5a;
  border-radius:4px;background:#0a1828;color:#7ab3ff;cursor:pointer;transition:all .15s;}
button:hover{background:#0f2040;border-color:#00d4ff;color:#00d4ff;}
button.pri{background:#002a4a;border-color:#00d4ff;color:#00d4ff;}
button.danger{border-color:#4a1a1a;color:#aa4444;}
button.danger:hover{background:#2a0a0a;border-color:#ff4444;color:#ff6666;}
.controls{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}

.info{font-family:'Share Tech Mono',monospace;font-size:.66rem;color:#4a7a9a;
  margin-top:7px;line-height:1.6;min-height:40px;}
.info span{color:#00d4ff;} .info b{color:#ffcc44;}
.info.c-ff span{color:#cc88ff;} .info.c-bfs span{color:#00dd88;}
.info.c-dfs span{color:#ffaa22;} .info.c-kru span{color:#44ccff;}
.info.c-pri span{color:#88ff44;} .info.c-bfn span{color:#ff6666;}
.info.c-top span{color:#dd88ff;}

.legend{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:.65rem;color:#4a6080;font-family:'Share Tech Mono',monospace;}
.ldot{width:8px;height:8px;border-radius:50%;}

.edit-hint{font-family:'Share Tech Mono',monospace;font-size:.61rem;color:#2a4a6a;line-height:1.75;}
.edit-hint b{color:#5a8a6a;}
.edit-section label{display:block;font-family:'Share Tech Mono',monospace;font-size:.63rem;color:#5a8aaa;margin-bottom:3px;}
.edit-section input{width:100%;padding:3px 6px;background:#060c18;border:1px solid #1a3a5a;
  border-radius:4px;color:#e0e8ff;font-family:'Share Tech Mono',monospace;font-size:.71rem;outline:none;}
.edit-section input:focus{border-color:#00d4ff;}

.popup{position:fixed;display:none;z-index:1000;background:#0d1828;
  border-radius:6px;padding:11px 12px;min-width:168px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.popup label{font-family:'Share Tech Mono',monospace;font-size:.64rem;color:#5a8aaa;display:block;margin-bottom:5px;}
.popup input{width:100%;padding:4px 7px;background:#060c18;border:1px solid #1a3a5a;
  border-radius:4px;color:#e0e8ff;font-family:'Share Tech Mono',monospace;font-size:.78rem;outline:none;margin-bottom:7px;}
.popup .wp-btns{display:flex;gap:5px;}
.popup .wp-btns button{flex:1;font-size:.71rem;padding:4px;}

.ctx-menu{position:fixed;display:none;z-index:999;background:#0d1828;border:1px solid #1a3a5a;
  border-radius:6px;padding:4px 0;min-width:145px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.ctx-menu div{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.78rem;
  padding:6px 12px;cursor:pointer;color:#7ab3ff;transition:background .1s;}
.ctx-menu div:hover{background:#0f2040;color:#00d4ff;}
.ctx-menu .sep{height:1px;background:#1a2a40;margin:2px 0;pointer-events:none;}
.ctx-menu div.red{color:#aa4444;}
.ctx-menu div.red:hover{background:#1a0808;color:#ff6666;}

.flow-bar-wrap{margin-top:5px;}
.flow-bar-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#7a6a9a;margin-bottom:3px;}
.flow-bar{height:9px;background:#1a0a2a;border-radius:5px;overflow:hidden;}
.flow-bar-fill{height:100%;background:linear-gradient(90deg,#7700aa,#cc88ff);border-radius:5px;transition:width .3s;}
</style>
</head>
<body>
<h1>// Graph Algorithm Visualizer</h1>
<div class="subtitle">7 algorithms — interactive editor on every tab</div>

<div class="tab-bar">
  <button class="tab-btn t-dijk on"  onclick="switchTab('dijk')">◎ DIJKSTRA</button>
  <button class="tab-btn t-ff"       onclick="switchTab('ff')">⊳ FORD-FULKERSON</button>
  <button class="tab-btn t-bfs"      onclick="switchTab('bfs')">⊞ BFS</button>
  <button class="tab-btn t-dfs"      onclick="switchTab('dfs')">⊟ DFS</button>
  <button class="tab-btn t-kru"      onclick="switchTab('kru')">⋈ KRUSKAL</button>
  <button class="tab-btn t-pri"      onclick="switchTab('pri')">⊕ PRIM</button>
  <button class="tab-btn t-bfn"      onclick="switchTab('bfn')">± BELLMAN-FORD</button>
  <button class="tab-btn t-top"      onclick="switchTab('top')">↧ TOPO SORT</button>
</div>

<!-- Each section is generated by JS to keep HTML lean -->
<div id="sec-dijk" class="section on"></div>
<div id="sec-ff"   class="section"></div>
<div id="sec-bfs"  class="section"></div>
<div id="sec-dfs"  class="section"></div>
<div id="sec-kru"  class="section"></div>
<div id="sec-pri"  class="section"></div>
<div id="sec-bfn"  class="section"></div>
<div id="sec-top"  class="section"></div>

<!-- Shared popups -->
<div class="popup" id="wPop" style="border:1px solid #00d4ff;">
  <label id="wPopLabel">WEIGHT</label>
  <input id="wPopInput" type="number" min="-99" max="9999" value="1">
  <div class="wp-btns"><button class="pri" onclick="wPopOK()">OK</button><button onclick="wPopCancel()">CANCEL</button></div>
</div>
<div class="ctx-menu" id="ctxMenu">
  <div id="ctxSrc" onclick="ctxAction('src')">Set as Source</div>
  <div id="ctxTgt" onclick="ctxAction('tgt')">Set as Target</div>
  <div id="ctxSnk" onclick="ctxAction('snk')" style="display:none">Set as Sink</div>
  <div class="sep"></div>
  <div class="red" onclick="ctxAction('del')">Delete Node</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  SHARED UTILITIES
// ═══════════════════════════════════════════════════════════════
const NR = 20; // node radius
const TABS = ['dijk','ff','bfs','dfs','kru','pri','bfn','top'];
let activeTab = 'dijk';

function switchTab(t){
  TABS.forEach(id=>{
    document.getElementById('sec-'+id).classList.toggle('on', id===t);
    document.querySelector('.tab-btn.t-'+id).classList.toggle('on', id===t);
  });
  activeTab = t;
  closeCtx();
  redrawAll();
}

function redrawAll(){
  const fns={dijk:dijkDraw,ff:ffDraw,bfs:bfsDraw,dfs:dfsDraw,kru:kruDraw,pri:priDraw,bfn:bfnDraw,top:topDraw};
  if(fns[activeTab]) fns[activeTab]();
}

// ── Canvas / section builder ────────────────────────────────────
function makeSection(id, accentColor, rightPanelHTML, legendItems, modeBarIds){
  const sec = document.getElementById('sec-'+id);
  const modesHTML = modeBarIds.map(([mid,label,isDefault])=>
    `<button class="mode-btn${isDefault?' on':''}" id="mb-${id}-${mid}" onclick="${id}SetMode('${mid}')">${label}</button>`
  ).join('');
  sec.innerHTML = `
    <div class="mode-bar">${modesHTML}</div>
    <div class="layout">
      <div>
        <canvas id="cv-${id}" width="560" height="440"></canvas>
        <div class="legend" id="leg-${id}">${legendItems}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;min-width:200px;">
        ${rightPanelHTML}
      </div>
    </div>`;
}

function legendItem(color, border, label){
  return `<div class="legend-item"><div class="ldot" style="background:${color};border:1.5px solid ${border}"></div>${label}</div>`;
}

// ── Shared graph editor helpers (one instance per tab) ──────────
function makeEditor(cfg){
  // cfg: {id, nodes, edges, directed, negWeights, onReset, colorAccent}
  const cv = ()=>document.getElementById('cv-'+cfg.id);
  const r = {};
  r.mode = 'select';
  r.hNode = null; r.hEdge = -1;
  r.dragNode = null; r.dragOX = 0; r.dragOY = 0; r.wasDrag = false;
  r.edgeFirst = null;
  r.pendingEdge = null; r.editEdgeIdx = -1;
  r.ctxNode = null;

  r.setMode = function(m){
    r.mode = m; r.edgeFirst = null; r.hEdge = -1;
    document.querySelectorAll(`#sec-${cfg.id} .mode-btn`).forEach(b=>{
      b.classList.remove('on','edit-on');
    });
    const btn = document.getElementById(`mb-${cfg.id}-${m}`);
    if(btn) btn.classList.add(m==='select'?'on':'edit-on');
    const cursors={select:'default',drag:'grab',addNode:'crosshair',addEdge:'crosshair',delete:'crosshair'};
    cv().style.cursor = cursors[m]||'default';
    document.getElementById(`add-node-sec-${cfg.id}`) && (document.getElementById(`add-node-sec-${cfg.id}`).style.display=m==='addNode'?'block':'none');
    cfg.onDraw();
  };

  r.nodeAt = (mx,my)=> Object.keys(cfg.nodes).find(n=>Math.hypot(mx-cfg.nodes[n].x,my-cfg.nodes[n].y)<=NR+3)||null;
  r.edgeAt = function(mx,my){
    for(let i=0;i<cfg.edges.length;i++){
      const e=cfg.edges[i]; const a=cfg.nodes[e.u],b=cfg.nodes[e.v]; if(!a||!b)continue;
      let sx=a.x,sy=a.y,ex=b.x,ey=b.y;
      if(cfg.directed){const dx=b.x-a.x,dy=b.y-a.y,l=Math.sqrt(dx*dx+dy*dy)||1;sx=a.x+dx/l*NR;sy=a.y+dy/l*NR;ex=b.x-dx/l*NR;ey=b.y-dy/l*NR;}
      const dx=ex-sx,dy=ey-sy,l2=dx*dx+dy*dy; if(!l2)continue;
      const t=Math.max(0,Math.min(1,((mx-sx)*dx+(my-sy)*dy)/l2));
      if(Math.hypot(mx-(sx+t*dx),my-(sy+t*dy))<9)return i;
    }return -1;
  };

  r.addNodeAt = function(x,y){
    const used=new Set(Object.keys(cfg.nodes));
    let l=''; const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    // Special handling for FF (prefer S,T)
    const pool=cfg.labelPool||[...alpha].concat([...alpha].map(c=>c+'1'));
    for(const c of pool){if(!used.has(c)){l=c;break;}}
    const inp=document.getElementById(`new-node-${cfg.id}`);
    const custom=inp?inp.value.trim().toUpperCase():'';
    if(custom){ if(cfg.nodes[custom]){alert('Node "'+custom+'" exists.');return;} l=custom; if(inp)inp.value=''; }
    if(!l)return;
    cfg.nodes[l]={x:Math.round(x),y:Math.round(y)};
    cfg.onReset(); cfg.onDraw();
  };

  r.deleteNode = function(n){
    if(n===cfg.src||(cfg.src2&&n===cfg.src2)){alert('Cannot delete source/sink. Reassign first.');return;}
    delete cfg.nodes[n];
    cfg.edges = cfg.edges.filter(e=>e.u!==n&&e.v!==n);
    cfg.onReset(); cfg.onDraw();
  };

  function attachEvents(){
    const c = cv();
    c.addEventListener('mousemove',e=>{
      const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const pN=r.hNode,pE=r.hEdge;
      r.hNode=r.nodeAt(mx,my);
      r.hEdge=(r.mode==='delete'&&!r.hNode)?r.edgeAt(mx,my):-1;
      if(r.dragNode){
        cfg.nodes[r.dragNode].x=Math.max(NR,Math.min(c.width-NR,mx+r.dragOX));
        cfg.nodes[r.dragNode].y=Math.max(NR,Math.min(c.height-NR,my+r.dragOY));
        r.wasDrag=true; cfg.onReset(); cfg.onDraw(); return;
      }
      if(r.hNode!==pN||r.hEdge!==pE) cfg.onDraw();
    });
    c.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      const rect=c.getBoundingClientRect(),n=r.nodeAt(e.clientX-rect.left,e.clientY-rect.top);
      if(r.mode==='drag'&&n){r.dragNode=n;r.dragOX=cfg.nodes[n].x-(e.clientX-rect.left);r.dragOY=cfg.nodes[n].y-(e.clientY-rect.top);r.wasDrag=false;c.style.cursor='grabbing';}
    });
    c.addEventListener('mouseup',()=>{r.dragNode=null;if(r.mode==='drag')c.style.cursor='grab';});
    c.addEventListener('click',e=>{
      if(r.wasDrag){r.wasDrag=false;return;}
      const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,n=r.nodeAt(mx,my);
      closeCtx();
      if(r.mode==='select'){
        if(n&&cfg.onNodeClick) cfg.onNodeClick(n);
        return;
      }
      if(r.mode==='addNode'){if(!n)r.addNodeAt(mx,my);return;}
      if(r.mode==='addEdge'){
        if(!n)return;
        if(!r.edgeFirst){r.edgeFirst=n;cfg.onDraw();return;}
        if(n===r.edgeFirst){r.edgeFirst=null;cfg.onDraw();return;}
        const dup=cfg.directed?cfg.edges.some(e=>e.u===r.edgeFirst&&e.v===n)
          :cfg.edges.some(e=>(e.u===r.edgeFirst&&e.v===n)||(e.u===n&&e.v===r.edgeFirst));
        if(dup){r.edgeFirst=null;cfg.onDraw();return;}
        r.pendingEdge={u:r.edgeFirst,v:n}; r.edgeFirst=null;
        openWPop(e.clientX,e.clientY,false,cfg.negWeights?-9:1,cfg.defaultW||1);
        return;
      }
      if(r.mode==='delete'){
        if(n){r.deleteNode(n);return;}
        const ei=r.edgeAt(mx,my);
        if(ei>=0){cfg.edges.splice(ei,1);cfg.onReset();cfg.onDraw();}
      }
    });
    c.addEventListener('dblclick',e=>{
      const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
      if(r.nodeAt(mx,my))return;
      const ei=r.edgeAt(mx,my);
      if(ei>=0){r.editEdgeIdx=ei;r.pendingEdge=null;openWPop(e.clientX,e.clientY,true,cfg.negWeights?-99:1,cfg.edges[ei].w);}
    });
    c.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const rect=c.getBoundingClientRect(),n=r.nodeAt(e.clientX-rect.left,e.clientY-rect.top);
      if(n) openCtx(n,e.clientX,e.clientY,cfg);
    });
  }
  attachEvents();
  return r;
}

// ── wPop (shared weight popup) ───────────────────────────────────
let wPopCfg = null;
function openWPop(cx,cy,isEdit,minVal=1,val=1){
  wPopCfg={isEdit};
  const p=document.getElementById('wPop');
  document.getElementById('wPopLabel').textContent=isEdit?'EDIT WEIGHT / CAPACITY':'WEIGHT / CAPACITY';
  p.style.display='block';
  p.style.left=Math.min(cx+8,window.innerWidth-180)+'px';
  p.style.top=Math.min(cy-15,window.innerHeight-90)+'px';
  const inp=document.getElementById('wPopInput');
  inp.min=minVal; inp.value=val;
  setTimeout(()=>inp.select(),40);
}
function wPopOK(){
  const w=parseInt(document.getElementById('wPopInput').value)||1;
  const tab=activeTab;
  const ed=EDITORS[tab];
  const cfg=CFGS[tab];
  if(!ed||!cfg)return;
  if(wPopCfg.isEdit){
    if(ed.editEdgeIdx>=0&&ed.editEdgeIdx<cfg.edges.length) cfg.edges[ed.editEdgeIdx].w=w;
    ed.editEdgeIdx=-1;
  } else {
    if(ed.pendingEdge) cfg.edges.push({u:ed.pendingEdge.u,v:ed.pendingEdge.v,w});
    ed.pendingEdge=null;
  }
  document.getElementById('wPop').style.display='none';
  cfg.onReset(); cfg.onDraw();
}
function wPopCancel(){
  const tab=activeTab; const ed=EDITORS[tab];
  if(ed){ed.pendingEdge=null;ed.editEdgeIdx=-1;}
  document.getElementById('wPop').style.display='none';
  if(CFGS[tab]) CFGS[tab].onDraw();
}
document.getElementById('wPopInput').addEventListener('keydown',e=>{if(e.key==='Enter')wPopOK();if(e.key==='Escape')wPopCancel();});

// ── Context menu (shared) ───────────────────────────────────────
let ctxCfg=null, ctxNode2=null;
function openCtx(n,cx,cy,cfg){
  ctxCfg=cfg; ctxNode2=n;
  const m=document.getElementById('ctxMenu');
  document.getElementById('ctxSnk').style.display=cfg.hasSnk?'block':'none';
  document.getElementById('ctxTgt').style.display=cfg.hasTgt!==false?'block':'none';
  m.style.display='block'; m.style.left=cx+'px'; m.style.top=cy+'px';
}
function closeCtx(){document.getElementById('ctxMenu').style.display='none';ctxCfg=null;ctxNode2=null;}
function ctxAction(act){
  if(!ctxCfg||!ctxNode2){closeCtx();return;}
  if(act==='src'){ctxCfg.src=ctxNode2;if(ctxCfg.onSrcChange)ctxCfg.onSrcChange();}
  if(act==='tgt'){if(ctxNode2!==ctxCfg.src){ctxCfg.tgt=ctxNode2;if(ctxCfg.onTgtChange)ctxCfg.onTgtChange();}}
  if(act==='snk'){if(ctxNode2!==ctxCfg.src){ctxCfg.src2=ctxNode2;if(ctxCfg.onSnkChange)ctxCfg.onSnkChange();}}
  if(act==='del'){const ed=EDITORS[activeTab];if(ed)ed.deleteNode(ctxNode2);}
  closeCtx(); CFGS[activeTab].onDraw();
}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx-menu')&&!e.target.closest('canvas'))closeCtx();});

// ── Shared draw primitives ──────────────────────────────────────
function drawArrow(ctx,x1,y1,x2,y2,color,lw,glow){
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle=color; ctx.lineWidth=lw;
  ctx.shadowColor=glow||'transparent'; ctx.shadowBlur=glow?8:0;
  ctx.stroke(); ctx.shadowBlur=0;
  const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy)||1;
  const ux=dx/l,uy=dy/l,ah=9,aw=4.5;
  const ax=x2-ux*ah,ay=y2-uy*ah,px=-uy,py=ux;
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(ax+px*aw,ay+py*aw); ctx.lineTo(ax-px*aw,ay-py*aw);
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
}

function drawEdgeBase(ctx,nodes,edges,directed,highlightSet,hovEdge,pathColor,defaultColor){
  edges.forEach(({u,v,w},i)=>{
    const a=nodes[u],b=nodes[v]; if(!a||!b)return;
    const key=u+'-'+v, keyR=v+'-'+u;
    const inHL=highlightSet&&(highlightSet.has(key)||(!directed&&highlightSet.has(keyR)));
    const isHov=hovEdge===i;
    const color=inHL?pathColor:isHov?'#ff5544':defaultColor||'#1a2a40';
    const lw=inHL?2.5:isHov?2:1.5;
    if(directed){
      const dx=b.x-a.x,dy=b.y-a.y,l=Math.sqrt(dx*dx+dy*dy)||1;
      drawArrow(ctx,a.x+dx/l*NR,a.y+dy/l*NR,b.x-dx/l*NR,b.y-dy/l*NR,color,lw,inHL?color:null);
    } else {
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=color; ctx.lineWidth=lw;
      ctx.shadowColor=inHL?color:'transparent'; ctx.shadowBlur=inHL?8:0;
      ctx.stroke(); ctx.shadowBlur=0;
    }
    // Weight label
    if(w!==undefined){
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      const ox=-(b.y-a.y)/Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2||1)*11;
      const oy=(b.x-a.x)/Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2||1)*11;
      ctx.font='10px Share Tech Mono,monospace';
      ctx.fillStyle=inHL?'#ffcc44':isHov?'#ff8888':'#2a4a6a';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(w,mx+ox,my+oy);
    }
  });
}

function drawNodeBase(ctx,nodes,nodeStates,src,tgt,src2,hov,edgeFirst){
  // nodeStates: map of node->{ fill, stroke, glow, textColor }
  Object.keys(nodes).forEach(n=>{
    const {x,y}=nodes[n];
    const st=nodeStates[n]||{fill:'#0d1828',stroke:'#2a5a9a',glow:null,textColor:'#7ab3ff'};
    const isHov=hov===n, isEF=edgeFirst===n;
    let {fill,stroke,glow,textColor}=st;
    if(isEF){stroke='#aadd00';glow='#aadd00';}
    else if(isHov&&!st.glow){stroke='#aaccff';}
    if(glow){ctx.shadowColor=glow;ctx.shadowBlur=14;}
    ctx.beginPath(); ctx.arc(x,y,NR,0,Math.PI*2);
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=(n===src||n===tgt||n===src2)?2.2:1.5;
    ctx.stroke(); ctx.shadowBlur=0;
    // rings
    if(n===src){ctx.beginPath();ctx.arc(x,y,26,0,Math.PI*2);ctx.strokeStyle='rgba(0,212,255,.2)';ctx.lineWidth=1;ctx.stroke();}
    if(n===tgt&&tgt!==src){ctx.beginPath();ctx.arc(x,y,26,0,Math.PI*2);ctx.strokeStyle='rgba(255,102,34,.25)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
    if(n===src2&&src2!==src){ctx.beginPath();ctx.arc(x,y,26,0,Math.PI*2);ctx.strokeStyle='rgba(255,200,50,.25)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
    ctx.font='bold 12px Rajdhani,sans-serif';
    ctx.fillStyle=textColor; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n,x,y);
  });
}

function labelSrcTgt(ctx,nodes,src,tgt,src2){
  ctx.font='9px Share Tech Mono,monospace'; ctx.textAlign='center';
  if(nodes[src]){ctx.fillStyle='rgba(0,212,255,.5)';ctx.fillText('SRC',nodes[src].x,nodes[src].y-33);}
  if(nodes[tgt]&&tgt!==src){ctx.fillStyle='rgba(255,102,34,.5)';ctx.fillText('TGT',nodes[tgt].x,nodes[tgt].y-33);}
  if(nodes[src2]&&src2&&src2!==src){ctx.fillStyle='rgba(255,200,50,.5)';ctx.fillText('SNK',nodes[src2].x,nodes[src2].y-33);}
}

function randGraphUndirected(n,canvasId,negOk){
  const cv=document.getElementById(canvasId);
  const W=cv.width,H=cv.height,pad=50,alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const labels=[]; for(let i=0;i<n;i++)labels.push(i<26?alpha[i]:alpha[i-26]+'1');
  const nN={},placed=[];let att=0;
  for(let i=0;i<n;i++){let x,y,ok;do{x=pad+Math.random()*(W-pad*2);y=pad+Math.random()*(H-pad*2);ok=placed.every(p=>Math.hypot(x-p.x,y-p.y)>65);att++;}while(!ok&&att<2000);placed.push({x,y});nN[labels[i]]={x:Math.round(x),y:Math.round(y)};}
  const sh=[...labels].sort(()=>Math.random()-.5),nE=[],inT=new Set([sh[0]]);
  for(let i=1;i<sh.length;i++){const v=sh[i],tA=[...inT],u=tA[Math.floor(Math.random()*tA.length)];nE.push({u,v,w:(negOk?(Math.random()<.2?-(1+Math.floor(Math.random()*5)):1)+Math.floor(Math.random()*10):1+Math.floor(Math.random()*12))});inT.add(v);}
  const ex=Math.floor(n*(0.3+Math.random()*0.4));let tries=0;
  while(nE.length<n-1+ex&&tries<500){tries++;const a=labels[Math.floor(Math.random()*n)],b=labels[Math.floor(Math.random()*n)];if(a===b)continue;if(nE.some(e=>(e.u===a&&e.v===b)||(e.u===b&&e.v===a)))continue;nE.push({u:a,v:b,w:negOk&&Math.random()<.2?-(1+Math.floor(Math.random()*4)):1+Math.floor(Math.random()*12)});}
  return {nodes:nN,edges:nE,src:labels[0],tgt:labels[n-1]};
}

function randGraphDAG(n,canvasId){
  const cv=document.getElementById(canvasId);
  const W=cv.width,H=cv.height,pad=50,alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const labels=[]; for(let i=0;i<n;i++)labels.push(i<26?alpha[i]:alpha[i-26]+'1');
  // Place left-to-right
  const cols=Math.ceil(Math.sqrt(n*1.5));
  const nN={};
  labels.forEach((l,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    nN[l]={x:Math.round(pad+col*(W-pad*2)/(cols-1||1)),y:Math.round(pad+row*(H-pad*2)/Math.max(1,Math.ceil(n/cols)-1))};
  });
  const nE=[];
  for(let i=0;i<n-1;i++){nE.push({u:labels[i],v:labels[i+1],w:undefined});}
  const ex=Math.floor(n*0.5);let tries=0;
  while(nE.length<n-1+ex&&tries<500){tries++;const ai=Math.floor(Math.random()*n),bi=Math.floor(Math.random()*n);if(ai>=bi)continue;if(nE.some(e=>e.u===labels[ai]&&e.v===labels[bi]))continue;nE.push({u:labels[ai],v:labels[bi],w:undefined});}
  return {nodes:nN,edges:nE};
}

function randGraphDirected(n,canvasId){
  const cv=document.getElementById(canvasId);
  const W=cv.width,H=cv.height,pad=55;
  const pool=['S','A','B','C','D','E','F','G','H','I','J','K'];
  const labels=[];
  for(let i=0;i<n;i++)labels.push(i<pool.length?pool[i]:'N'+i);
  labels[n-1]='T';
  const nN={},placed=[];let att=0;
  for(let i=0;i<n;i++){let x,y,ok;do{x=pad+Math.random()*(W-pad*2);y=pad+Math.random()*(H-pad*2);ok=placed.every(p=>Math.hypot(x-p.x,y-p.y)>70);att++;}while(!ok&&att<2000);placed.push({x,y});nN[labels[i]]={x:Math.round(x),y:Math.round(y)};}
  nN['S'].x=pad; nN['T'].x=W-pad;
  const sorted=[...labels];
  const nE=[];
  for(let i=0;i<sorted.length-1;i++)nE.push({u:sorted[i],v:sorted[i+1],w:2+Math.floor(Math.random()*12)});
  const ex=Math.floor(n*0.8);let tries=0;
  while(nE.length<sorted.length-1+ex&&tries<500){tries++;const ai=Math.floor(Math.random()*n),bi=Math.floor(Math.random()*n);if(ai===bi||bi<=ai)continue;const a=sorted[ai],b=sorted[bi];if(nE.some(e=>e.u===a&&e.v===b))continue;nE.push({u:a,v:b,w:2+Math.floor(Math.random()*10)});}
  return {nodes:nN,edges:nE};
}

      <div style="margin-top:8px"><div class="edit-section" style="margin-bottom:4px"><label>RANDOM SIZE</label><input id="ff-rand-sz" type="number" min="3" max="12" value="7" style="width:55px"> <span style="font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#2a4a6a">nodes</span></div>
      <button style="width:100%;font-size:.75rem" onclick="ffRandom()">⚄ RANDOM</button></div>
      <div class="controls"><button class="danger" onclick="ffClear()">CLEAR</button></div>
    </div>`,
    `${legendItem('#1a0a2a','#5a3a8a','no flow')}${legendItem('#cc88ff','#ee99ff','augmenting')}${legendItem('#997700','#ffcc44','saturated')}${legendItem('#007740','#00ff88','has flow')}`,
    [['select','◎ SELECT',true],['drag','⊹ DRAG',false],['addNode','+ NODE',false],['addEdge','⟶ EDGE',false],['delete','✕ DEL',false]]
  );
  EDITORS[ID]=makeEditor(cfg);

  let ffFlow={},ffTotal=0,ffDone=false,ffPath=[],ffHist=[];
  function ffInitFlow(){
    ffFlow={};
    Object.keys(cfg.nodes).forEach(u=>{ffFlow[u]={};});
    cfg.edges.forEach(({u,v})=>{if(!ffFlow[u])ffFlow[u]={};if(!ffFlow[v])ffFlow[v]={};ffFlow[u][v]=ffFlow[u][v]||0;ffFlow[v][u]=ffFlow[v][u]||0;});
    ffTotal=0;ffDone=false;ffPath=[];
  }
  function ffReset(){ffHist=[];ffInitFlow();document.getElementById('ff-info').innerHTML='Press <span>STEP →</span> to begin.';ffUpdateTable();ffUpdateBar();updateBackBtn(ID,ffHist);ffDraw();}
  cfg.onReset=ffReset;

  function ffBFS(){
    const parent={},vis=new Set([cfg.src]),q=[cfg.src];
    while(q.length){
      const node=q.shift();
      if(node===cfg.src2){const p=[node];let c=node;while(c!==cfg.src){c=parent[c];p.unshift(c);}return p;}
      for(const edge of cfg.edges){
        const s=edge.u,d=edge.v,cap=edge.w;
        if(s===node&&!vis.has(d)){const res=cap-((ffFlow[s]&&ffFlow[s][d])||0);if(res>0){vis.add(d);parent[d]=node;q.push(d);}}
      }
      for(const edge of cfg.edges){
        const s=edge.u,d=edge.v;
        if(d===node&&!vis.has(s)){const bf=(ffFlow[s]&&ffFlow[s][d])||0;if(bf>0){vis.add(s);parent[s]=node;q.push(s);}}
      }
    }return null;
  }
  function ffBN(path){
    let min=Infinity;
    for(let i=0;i<path.length-1;i++){const pu=path[i],pv=path[i+1];const fe=cfg.edges.find(e=>e.u===pu&&e.v===pv);if(fe)min=Math.min(min,fe.w-((ffFlow[pu]&&ffFlow[pu][pv])||0));else min=Math.min(min,(ffFlow[pv]&&ffFlow[pv][pu])||0);}return min;
  }
  function ffPush(path,amount){
    for(let i=0;i<path.length-1;i++){const pu=path[i],pv=path[i+1];if(!ffFlow[pu])ffFlow[pu]={};if(!ffFlow[pv])ffFlow[pv]={};const fe=cfg.edges.find(e=>e.u===pu&&e.v===pv);if(fe)ffFlow[pu][pv]=(ffFlow[pu][pv]||0)+amount;else ffFlow[pv][pu]=(ffFlow[pv][pu]||0)-amount;}ffTotal+=amount;
  }
  function ffStep(){
    if(ffDone)return;
    const fc={};Object.keys(ffFlow).forEach(u=>{fc[u]={...ffFlow[u]};});
    saveSnap(ffHist,{flow:fc,total:ffTotal,done:ffDone,path:[...ffPath],info:document.getElementById('ff-info').innerHTML});
    updateBackBtn(ID,ffHist);
    const path=ffBFS();
    if(!path){ffDone=true;ffPath=[];document.getElementById('ff-info').innerHTML=`<span>Max flow = ${ffTotal}</span><br>No more augmenting paths.`;ffUpdateTable();ffUpdateBar();ffDraw();return;}
    const bn=ffBN(path);ffPath=path;ffPush(path,bn);
    document.getElementById('ff-info').innerHTML=`Path:<span>${path.join('→')}</span><br>Bottleneck:<b>${bn}</b> Total:<span>${ffTotal}</span>`;
    ffUpdateTable();ffUpdateBar();ffDraw();
  }
  function ffBack(){
    const s=restoreSnap(ffHist);if(!s)return;
    const fc={};Object.keys(s.flow).forEach(u=>{fc[u]={...s.flow[u]};});
    ffFlow=fc;ffTotal=s.total;ffDone=s.done;ffPath=s.path;
    document.getElementById('ff-info').innerHTML=s.info;
    updateBackBtn(ID,ffHist);ffUpdateTable();ffUpdateBar();ffDraw();
  }
  function ffUpdateTable(){
    const ps=new Set();if(ffPath.length>1)for(let i=0;i<ffPath.length-1;i++)ps.add(ffPath[i]+'-'+ffPath[i+1]);
    document.getElementById('ff-edge-body').innerHTML=cfg.edges.map(({u,v,w})=>{
      const f=(ffFlow[u]&&ffFlow[u][v])||0,ip=ps.has(u+'-'+v);
      return `<tr${ip?' style="background:rgba(255,200,60,.07)"':''}><td style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:${ip?'#ffcc44':'#cc88ff'};padding:2px 4px">${u}→${v}</td><td style="font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:2px 4px;text-align:right">${f}</td><td style="font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:2px 4px;text-align:right">${w}</td></tr>`;
    }).join('');
  }
  function ffUpdateBar(){
    document.getElementById('ff-flow-val').textContent=ffTotal;
    const mx=cfg.edges.filter(e=>e.u===cfg.src).reduce((s,e)=>s+e.w,0);
    document.getElementById('ff-max-cap').textContent=mx;
    document.getElementById('ff-flow-bar').style.width=mx>0?Math.min(100,ffTotal/mx*100)+'%':'0%';
  }
  function ffDraw(){
    const cv=document.getElementById('cv-'+ID);const c=cv.getContext('2d');
    c.clearRect(0,0,cv.width,cv.height);
    const ps=new Set();if(ffPath.length>1)for(let i=0;i<ffPath.length-1;i++)ps.add(ffPath[i]+'-'+ffPath[i+1]);
    const ed=EDITORS[ID];
    cfg.edges.forEach(({u,v,w},i)=>{
      const a=cfg.nodes[u],b=cfg.nodes[v];if(!a||!b)return;
      const f=(ffFlow[u]&&ffFlow[u][v])||0;
      const sat=f>=w,inP=ps.has(u+'-'+v),hf=f>0,hov=ed.hEdge===i;
      const color=sat?'#997700':inP?'#cc88ff':hf?'#007740':hov?'#9944ff':'#1a2a40';
      const dx=b.x-a.x,dy=b.y-a.y,l=Math.sqrt(dx*dx+dy*dy)||1;
      drawArrow(c,a.x+dx/l*NR,a.y+dy/l*NR,b.x-dx/l*NR,b.y-dy/l*NR,color,inP?2.5:hov?2:hf?1.8:1.5,inP?'#cc88ff':null);
      const mx2=(a.x+b.x)/2,my2=(a.y+b.y)/2,ox=-(b.y-a.y)/l*12,oy=(b.x-a.x)/l*12;
      c.font='10px Share Tech Mono,monospace';c.fillStyle=sat?'#ffcc44':inP?'#ffcc44':hf?'#44cc88':'#2a4a6a';c.textAlign='center';c.textBaseline='middle';c.fillText(`${f}/${w}`,mx2+ox,my2+oy);
    });
    if(ed.mode==='addEdge'&&ed.edgeFirst&&ed.hNode&&ed.hNode!==ed.edgeFirst){
      const a=cfg.nodes[ed.edgeFirst],b=cfg.nodes[ed.hNode];
      c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.strokeStyle='rgba(200,100,255,.5)';c.lineWidth=1.5;c.setLineDash([5,5]);c.stroke();c.setLineDash([]);
    }
    const pnSet=new Set(ffPath);
    const ns={};Object.keys(cfg.nodes).forEach(n=>{
      const inP=pnSet.has(n);
      let fill='#0d1828',stroke='#4a2a6a',glow=null,textColor='#9966cc';
      if(n===cfg.src){fill='#002828';stroke='#00ccaa';textColor='#00ffdd';glow=inP?'#cc88ff':'#00ccaa';}
      else if(n===cfg.src2){fill='#1a1a00';stroke='#ccaa00';textColor='#ffdd44';glow=inP?'#cc88ff':'#ccaa00';}
      else if(inP){fill='#1a0a28';stroke='#cc88ff';glow='#cc88ff';textColor='#ee99ff';}
      ns[n]={fill,stroke,glow,textColor};
    });
    drawNodeBase(c,cfg.nodes,ns,cfg.src,null,cfg.src2,ed.hNode,ed.edgeFirst);
    labelSrcTgt(c,cfg.nodes,cfg.src,null,cfg.src2);
  }
  window.ffDraw=ffDraw; window.ffReset=ffReset;
  window.ffStep=ffStep; window.ffBack=ffBack;
  window.ffRunAll=function(){if(ffDone)ffReset();let i=0;const iv=setInterval(()=>{ffStep();i++;if(ffDone||i>200)clearInterval(iv);},180);};
  window.ffRandom=function(){const n=Math.max(3,Math.min(12,parseInt(document.getElementById('ff-rand-sz').value)||7));const g=randGraphDirected(n,'cv-ff');cfg.nodes=g.nodes;cfg.edges=g.edges;ffReset();};
  window.ffClear=function(){if(!confirm('Clear?'))return;cfg.nodes={S:{x:100,y:220},T:{x:460,y:220}};cfg.edges=[];ffReset();};
  window.ffSetMode=function(m){EDITORS[ID].setMode(m);};
  ffReset();
})();

      <div style="margin-top:8px"><div class="edit-section" style="margin-bottom:4px"><label>RANDOM SIZE</label><input id="dfs-rand-sz" type="number" min="3" max="15" value="9" style="width:55px"></div>

    </div>

    </div>`,
    `${legendItem('#0d1828','#2a5a9a','unrelaxed')}${legendItem('#200808','#ff6666','relaxed')}${legendItem('#ff6622','#ff8844','shortest path')}${legendItem('#330000','#ff4444','neg cycle')}`,
    [['select','◎ SELECT',true],['drag','⊹ DRAG',false],['addNode','+ NODE',false],['addEdge','⟶ EDGE',false],['delete','✕ DEL',false]]
  );
  EDITORS[ID]=makeEditor(cfg);

  let bfnDist={},bfnPrev={},bfnPass=0,bfnEdgeIdx=0,bfnDone=false,bfnNegCycle=false,bfnRelaxed=new Set(),bfnHist=[];
  function bfnReset(){
    bfnDist={};bfnPrev={};bfnPass=0;bfnEdgeIdx=0;bfnDone=false;bfnNegCycle=false;bfnRelaxed=new Set();bfnHist=[];
    Object.keys(cfg.nodes).forEach(n=>{bfnDist[n]=Infinity;bfnPrev[n]=null;});

  }
  cfg.onReset=bfnReset;
  function bfnTable(){

      return `<tr class="${neg?'neg':cls}"><td>${n}</td><td>${bfnDist[n]===Infinity?'∞':bfnDist[n]}${bfnPrev[n]?'←'+bfnPrev[n]:''}</td></tr>`;
    }).join('');
  }
  function bfnStep(){

    updateBackBtn(ID,bfnHist);
    if(bfnPass>=V){// Extra pass: negative cycle detection
      let nc=false;
      cfg.edges.forEach(({u,v,w})=>{if(bfnDist[u]!==Infinity&&bfnDist[u]+w<bfnDist[v]){bfnDist[v]=-Infinity;nc=true;}});

      } else {
        document.getElementById('bfn-info').innerHTML=`pass <span>${bfnPass+1}</span> check <span>${u}→${v}</span><br>no improvement`;
      }
      bfnEdgeIdx++;
    }
    if(bfnEdgeIdx>=cfg.edges.length){bfnPass++;bfnEdgeIdx=0;document.getElementById('bfn-pass').textContent=bfnPass;}
    if(bfnPass>=V-1&&bfnEdgeIdx===0){
      // Done with V-1 passes, next step does neg cycle check
    }
    bfnTable();bfnDraw();
  }
  function bfnBack(){
    const s=restoreSnap(bfnHist);if(!s)return;
    bfnDist=s.dist;bfnPrev=s.prev;bfnPass=s.pass;bfnEdgeIdx=s.edgeIdx;bfnDone=s.done;bfnNegCycle=s.negCycle;bfnRelaxed=new Set(s.relaxed);

      const dx=b.x-a.x,dy=b.y-a.y,l=Math.sqrt(dx*dx+dy*dy)||1;
      drawArrow(c,a.x+dx/l*NR,a.y+dy/l*NR,b.x-dx/l*NR,b.y-dy/l*NR,color,isPath||isCur?2.5:1.5,isPath||isCur?color:null);
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,ox=-(b.y-a.y)/l*11,oy=(b.x-a.x)/l*11;
      c.font='10px Share Tech Mono,monospace';c.fillStyle=isPath?'#ff8844':w<0?'#ff6666':isCur?'#ff9966':'#2a4a6a';c.textAlign='center';c.textBaseline='middle';c.fillText(w,mx+ox,my+oy);
    });
    const pathNodes=bfnDone&&bfnDist[cfg.tgt]!==Infinity&&!bfnNegCycle?new Set(bfnGetPath()):new Set();
    const ns={};Object.keys(cfg.nodes).forEach(n=>{
      const rel=bfnRelaxed.has(n),isPath=pathNodes.has(n);
      let fill='#0d1828',stroke='#2a5a9a',glow=null,textColor='#7ab3ff';
      if(bfnNegCycle&&bfnDist[n]===-Infinity){fill='#200000';stroke='#ff4444';glow='#ff4444';textColor='#ff4444';}
      else if(isPath&&bfnDone){fill='#331500';stroke='#ff6622';glow='#ff6622';textColor='#ff8844';}
      else if(rel){fill='#200808';stroke='#ff6666';textColor='#ff8888';}
      ns[n]={fill,stroke,glow,textColor};
    });
    drawNodeBase(c,cfg.nodes,ns,cfg.src,cfg.tgt,null,ed.hNode,ed.edgeFirst);
    Object.keys(cfg.nodes).forEach(n=>{if(bfnDist[n]!==Infinity&&bfnDist[n]!==-Infinity){c.font='9px Share Tech Mono,monospace';c.fillStyle='#6a3a3a';c.textAlign='center';c.fillText(bfnDist[n],cfg.nodes[n].x,cfg.nodes[n].y+32);}});
    labelSrcTgt(c,cfg.nodes,cfg.src,cfg.tgt,null);
  }
  window.bfnDraw=bfnDraw;window.bfnReset=bfnReset;
  window.bfnStep=bfnStep;window.bfnBack=bfnBack;

    const g=randGraphDirected(n,'cv-bfn');

    cfg.nodes=g.nodes;cfg.edges=g.edges;cfg.src='S';cfg.tgt='T';

  };
  window.bfnClear=function(){if(!confirm('Clear?'))return;cfg.nodes={S:{x:100,y:220},T:{x:460,y:220}};cfg.edges=[];cfg.src='S';cfg.tgt='T';document.getElementById('bfn-src').textContent='S';document.getElementById('bfn-tgt').textContent='T';bfnReset();};
  window.bfnSetMode=function(m){EDITORS[ID].setMode(m);};

// ═══════════════════════════════════════════════════════════════
//  8. TOPOLOGICAL SORT
// ═══════════════════════════════════════════════════════════════
(function(){
  const ID='top';
  const cfg={
    id:ID,directed:true,negWeights:false,
    nodes:{A:{x:55,y:220},B:{x:170,y:100},C:{x:170,y:340},D:{x:310,y:100},E:{x:310,y:220},F:{x:310,y:340},G:{x:450,y:160},H:{x:450,y:290},I:{x:530,y:220}},
    edges:[{u:'A',v:'B'},{u:'A',v:'C'},{u:'B',v:'D'},{u:'B',v:'E'},{u:'C',v:'E'},{u:'C',v:'F'},{u:'D',v:'G'},{u:'E',v:'G'},{u:'E',v:'H'},{u:'F',v:'H'},{u:'G',v:'I'},{u:'H',v:'I'}],
    src:null,tgt:null,hasTgt:false,hasSnk:false,
    onDraw:()=>topDraw(),onReset:()=>topReset()
  };
  CFGS[ID]=cfg;
  makeSection(ID,'#dd88ff',`
    <div class="panel">
      <h2 class="h-top">// TOPO ORDER</h2>
      <div id="top-order" style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:#dd88ff;line-height:1.8;min-height:60px"></div>
      <div id="top-indeg" style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:#5a4a7a;margin-top:4px;line-height:1.6"></div>
      <div class="info c-top" id="top-info">Press STEP to run Kahn's algorithm.</div>
    </div>
    <div class="panel">
      <h2 class="h-top">// TOPO SORT</h2>
      <div class="controls">
        <button id="back-btn-top" disabled style="opacity:.4" onclick="topBack()">← BACK</button>
        <button style="background:#160020;border-color:#dd88ff;color:#dd88ff" onclick="topStep()">STEP →</button>
        <button onclick="topRunAll()">RUN ALL</button>
        <button onclick="topReset()">RESET</button>
      </div>
    </div>
    <div class="panel">
      <h2 class="h-top">// ABOUT</h2>
      <div style="font-family:'Share Tech Mono',monospace;font-size:.61rem;color:#2a1a3a;line-height:1.75">Orders nodes of a <span style="color:#dd88ff">DAG</span><br>so every edge points<br>forward in the order.<br><br>Uses <b style="color:#aa66ff">Kahn's algorithm</b>:<br>Repeatedly pick nodes<br>with <b style="color:#ffcc44">in-degree = 0</b>,<br>remove their edges.<br><br>Detects <b style="color:#ff6644">cycles</b> — if not<br>all nodes are sorted,<br>a cycle exists.</div>
      <div style="margin-top:8px"><div class="edit-section" style="margin-bottom:4px"><label>RANDOM SIZE</label><input id="top-rand-sz" type="number" min="3" max="12" value="9" style="width:55px"></div>
      <button style="width:100%;font-size:.75rem" onclick="topRandom()">⚄ RANDOM DAG</button></div>
      <div class="controls"><button class="danger" onclick="topClear()">CLEAR</button></div>
    </div>`,
    `${legendItem('#0d1828','#2a5a9a','not processed')}${legendItem('#160020','#dd88ff','in queue (in-deg 0)')}${legendItem('#1a0a28','#aa66ff','processed')}${legendItem('#002244','#00d4ff','current')}`,
    [['select','◎ SELECT',true],['drag','⊹ DRAG',false],['addNode','+ NODE',false],['addEdge','⟶ EDGE',false],['delete','✕ DEL',false]]
  );
  EDITORS[ID]=makeEditor(cfg);

  let topInDeg={},topQueue=[],topOrder=[],topProcessed=new Set(),topCur=null,topDone=false,topHist=[];
  function topReset(){
    topInDeg={};topQueue=[];topOrder=[];topProcessed=new Set();topCur=null;topDone=false;topHist=[];
    Object.keys(cfg.nodes).forEach(n=>topInDeg[n]=0);
    cfg.edges.forEach(({v})=>{if(topInDeg[v]!==undefined)topInDeg[v]++;});
    topQueue=Object.keys(cfg.nodes).filter(n=>topInDeg[n]===0);
    document.getElementById('top-info').innerHTML='Press <span>STEP →</span> (Kahn\'s algorithm).';
    document.getElementById('top-order').textContent='';
    topShowIndeg();updateBackBtn(ID,topHist);topDraw();
  }
  cfg.onReset=topReset;
  function topShowIndeg(){document.getElementById('top-indeg').innerHTML=Object.keys(cfg.nodes).map(n=>`${n}:${topInDeg[n]}`).join(' ');}
  function topStep(){
    if(topDone)return;
    saveSnap(topHist,{indeg:{...topInDeg},q:[...topQueue],order:[...topOrder],proc:[...topProcessed],cur:topCur,done:topDone,info:document.getElementById('top-info').innerHTML,orderHTML:document.getElementById('top-order').textContent,indegHTML:document.getElementById('top-indeg').innerHTML});
    updateBackBtn(ID,topHist);
    if(!topQueue.length){topDone=true;const hasCycle=topOrder.length<Object.keys(cfg.nodes).length;document.getElementById('top-info').innerHTML=hasCycle?'<span style="color:#ff6644">CYCLE detected!</span> Not a valid DAG.':`<span>Done!</span> Order:<span>${topOrder.join('→')}</span>`;topDraw();return;}
    const node=topQueue.shift();topCur=node;topProcessed.add(node);topOrder.push(node);
    const dec=[];
    cfg.edges.forEach(({u,v})=>{if(u===node&&topInDeg[v]!==undefined){topInDeg[v]--;dec.push(v);if(topInDeg[v]===0)topQueue.push(v);}});
    document.getElementById('top-info').innerHTML=`process <span>${node}</span><br>decrement:[${dec.join(',')||'—'}] queue:[${topQueue.join(',')||'∅'}]`;
    document.getElementById('top-order').textContent=topOrder.join(' → ');
    topShowIndeg();
    if(!topQueue.length){topDone=true;const hasCycle=topOrder.length<Object.keys(cfg.nodes).length;document.getElementById('top-info').innerHTML=hasCycle?'<span style="color:#ff6644">CYCLE detected!</span>':`<span>Done!</span> Order:<span>${topOrder.join('→')}</span>`;}
    topDraw();
  }
  function topBack(){
    const s=restoreSnap(topHist);if(!s)return;
    topInDeg=s.indeg;topQueue=s.q;topOrder=s.order;topProcessed=new Set(s.proc);topCur=s.cur;topDone=s.done;
    document.getElementById('top-info').innerHTML=s.info;document.getElementById('top-order').textContent=s.orderHTML;document.getElementById('top-indeg').innerHTML=s.indegHTML;
    updateBackBtn(ID,topHist);topDraw();
  }
  function topDraw(){
    const cv=document.getElementById('cv-'+ID);const c=cv.getContext('2d');
    c.clearRect(0,0,cv.width,cv.height);
    const ed=EDITORS[ID];
    const procEdges=new Set();topProcessed.forEach(n=>cfg.edges.forEach(({u,v})=>{if(u===n)procEdges.add(n+'-'+v);}));
    cfg.edges.forEach(({u,v},i)=>{
      const a=cfg.nodes[u],b=cfg.nodes[v];if(!a||!b)return;
      const isProc=procEdges.has(u+'-'+v),isHov=ed.hEdge===i;
      const color=isProc?'#aa66ff':isHov?'#ff5544':'#1a2a40';
      const dx=b.x-a.x,dy=b.y-a.y,l=Math.sqrt(dx*dx+dy*dy)||1;
      drawArrow(c,a.x+dx/l*NR,a.y+dy/l*NR,b.x-dx/l*NR,b.y-dy/l*NR,color,isProc?2:1.5,isProc?color:null);
    });
    if(ed.mode==='addEdge'&&ed.edgeFirst&&ed.hNode&&ed.hNode!==ed.edgeFirst){
      const a=cfg.nodes[ed.edgeFirst],b=cfg.nodes[ed.hNode];
      c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.strokeStyle='rgba(200,100,255,.5)';c.lineWidth=1.5;c.setLineDash([5,5]);c.stroke();c.setLineDash([]);
    }
    const ns={};Object.keys(cfg.nodes).forEach(n=>{
      const inQ=topQueue.includes(n),isCur=n===topCur,isProc=topProcessed.has(n)&&n!==topCur;
      let fill='#0d1828',stroke='#2a5a9a',glow=null,textColor='#7ab3ff';
      if(isCur){fill='#003344';stroke='#00d4ff';glow='#00d4ff';textColor='#00d4ff';}
      else if(inQ){fill='#160020';stroke='#dd88ff';glow='#dd88ff';textColor='#ffaaff';}
      else if(isProc){fill='#1a0a28';stroke='#aa66ff';textColor='#cc99ff';}
      ns[n]={fill,stroke,glow,textColor};
    });
    drawNodeBase(c,cfg.nodes,ns,null,null,null,ed.hNode,ed.edgeFirst);
    // Show in-degree
    Object.keys(cfg.nodes).forEach(n=>{if(!topProcessed.has(n)){c.font='9px Share Tech Mono,monospace';c.fillStyle='#5a4a7a';c.textAlign='center';c.fillText('↓'+topInDeg[n],cfg.nodes[n].x,cfg.nodes[n].y+32);}});
    // Show order index for processed
    topOrder.forEach((n,i)=>{c.font='9px Share Tech Mono,monospace';c.fillStyle='#8855cc';c.textAlign='center';c.fillText('#'+(i+1),cfg.nodes[n].x,cfg.nodes[n].y+32);});
  }
  window.topDraw=topDraw;window.topReset=topReset;
  window.topStep=topStep;window.topBack=topBack;
  window.topRunAll=function(){if(topDone)topReset();let i=0;const iv=setInterval(()=>{topStep();i++;if(topDone||i>300)clearInterval(iv);},180);};
  window.topRandom=function(){const n=Math.max(3,Math.min(12,parseInt(document.getElementById('top-rand-sz').value)||9));const g=randGraphDAG(n,'cv-top');cfg.nodes=g.nodes;cfg.edges=g.edges;topReset();};
  window.topClear=function(){if(!confirm('Clear?'))return;cfg.nodes={A:{x:280,y:220}};cfg.edges=[];topReset();};
  window.topSetMode=function(m){EDITORS[ID].setMode(m);};
  topReset();
})();

      how: [
        'Start with zero flow on every edge.',
        'Use BFS to find an augmenting path — a route from S to T with remaining residual capacity.',
        'Identify the bottleneck: the minimum residual capacity along that path.',
        'Push that amount of flow along the path, updating both forward and backward (residual) edges.',
        'Repeat until no augmenting path exists — total flow is then maximum.'
      ],
      complexity: { time: 'O(V · E²) — Edmonds-Karp (BFS)', space: 'O(V + E)' },
      uses: ['Network bandwidth & traffic allocation', 'Bipartite matching (job assignment, ad targeting)', 'Airline crew scheduling', 'Image segmentation via min-cut', 'Baseball elimination problems'],
      limits: 'Directed graphs only. Requires non-negative integer or rational capacities to guarantee termination.'
    },
    bfs: {
      accent: '#00dd88',
      name: 'Breadth-First Search',
      year: '1959 — Edward F. Moore',
      what: 'Explores a graph level by level, visiting all nodes at distance 1 before those at distance 2, and so on. In unweighted graphs it finds the shortest path (minimum hops) from the source.',
      how: [
        'Enqueue the source node and mark it visited.',
        'Dequeue the front node (FIFO order).',
        'Enqueue all its unvisited neighbours and mark them visited immediately.',
        'Track depth: each neighbour is one level deeper than the current node.',
        'Repeat until the queue is empty — every reachable node has been processed.'
      ],
      complexity: { time: 'O(V + E)', space: 'O(V)' },
      uses: ['Shortest path in unweighted graphs', 'Social network "degrees of separation"', 'Web crawlers exploring links layer by layer', 'Solving word-ladder and sliding-puzzle problems', 'Finding all connected components', 'Peer-to-peer broadcasting'],
      limits: 'Treats all edges equally — does not account for edge weights. Uses more memory than DFS (stores entire frontier).'
    },
    dfs: {
      accent: '#ffaa22',
      name: 'Depth-First Search',
      year: '19th c. — Trémaux (maze solving); formalised ~1960s',
      what: 'Explores as deep as possible along each branch before backtracking. More useful for discovering graph structure than for finding shortest paths.',
      how: [
        'Push the source onto a stack (or call recursively).',
        'Pop (or recurse into) the top node; if unvisited, mark it and process it.',
        'Push all unvisited neighbours — they will be explored before siblings.',
        'When a dead end is reached, backtrack automatically by popping the stack.',
        'Continue until the stack is empty and all reachable nodes are visited.'
      ],
      complexity: { time: 'O(V + E)', space: 'O(V)' },
      uses: ['Cycle detection in graphs', 'Topological sorting (recursive post-order DFS)', 'Strongly connected components (Tarjan, Kosaraju)', 'Maze generation and solving', 'Syntax tree traversal in compilers', 'Finding bridges and articulation points'],
      limits: 'Does not find shortest paths. Recursive version can overflow the call stack on very deep graphs.'
    },
    kru: {
      accent: '#44ccff',
      name: "Kruskal's Algorithm",
      year: '1956 — Joseph B. Kruskal',
      what: 'Builds a Minimum Spanning Tree (MST) — the cheapest subset of edges that connects all nodes without any cycles. Operates on undirected, weighted, connected graphs.',
      how: [
        'Sort all edges by weight in ascending order.',
        'Initialise a Union-Find structure with one component per node.',
        'Examine each edge in order: if its endpoints are in different components, add it to the MST and merge the components.',
        'If both endpoints share a component, skip the edge — it would create a cycle.',
        'Stop when the MST has exactly V − 1 edges.'
      ],
      complexity: { time: 'O(E log E)', space: 'O(V + E)' },
      uses: ['Minimum-cost network cabling (telecom, power grids)', 'Pipeline and road network design', 'Cluster analysis in machine learning', 'Image segmentation', 'Approximation algorithms for TSP'],
      limits: 'Requires a connected graph. Less efficient than Prim on very dense graphs where E >> V.'
    },
    pri: {
      accent: '#88ff44',
      name: "Prim's Algorithm",
      year: '1930 Jarník; 1957 Prim; 1959 Dijkstra (independently)',
      what: 'Builds a Minimum Spanning Tree by growing one tree from a chosen start node, always extending it by the cheapest edge that reaches a new node.',
      how: [
        'Assign key = 0 to the start node, key = ∞ to all others.',
        'Pick the non-MST node with the smallest key value.',
        'Add it and its cheapest connecting edge to the MST.',
        'Update keys of its neighbours: if the connecting edge is cheaper than their current key, replace it.',
        'Repeat until every node is in the MST.'
      ],
      complexity: { time: 'O((V + E) log V) with a min-heap', space: 'O(V)' },
      uses: ['Same domain as Kruskal: network cabling, pipeline routing', 'Preferred over Kruskal on dense graphs (E close to V²)', 'Maze generation', 'Approximation for TSP', 'Wireless mesh network design'],
      limits: 'Requires a connected graph. The start node does not affect the final MST cost, only which of several equal-cost MSTs is produced.'
    },
    bfn: {
      accent: '#ff6666',
      name: 'Bellman-Ford Algorithm',
      year: '1955 Shimbel; 1956 Ford; 1958 Bellman',
      what: 'Finds shortest paths from a source to all reachable nodes, including graphs with negative edge weights. Also detects negative-weight cycles, which make shortest paths undefined.',
      how: [
        'Set source distance to 0; all others to ∞.',
        'Relax every edge |V| − 1 times: for each edge u→v with weight w, if dist[u] + w < dist[v], update dist[v] = dist[u] + w.',
        'After k passes, shortest paths using at most k edges are guaranteed correct.',
        'Run one extra (V-th) pass: if any distance still decreases, a negative cycle is reachable.',
        'Reconstruct paths by following predecessor pointers.'
      ],
      complexity: { time: 'O(V · E)', space: 'O(V)' },
      uses: ['Routing protocols with negative costs (RIP)', 'Currency arbitrage detection in financial markets', 'Scheduling problems with time-window constraints', 'Detecting negative cycles in cost models'],
      limits: 'Much slower than Dijkstra — O(VE) vs O((V+E) log V). If a negative cycle is reachable from the source, shortest paths to some nodes are −∞.'
    },
    top: {
      accent: '#dd88ff',
      name: "Topological Sort — Kahn's Algorithm",
      year: '1962 — Arthur B. Kahn',
      what: 'Orders nodes of a Directed Acyclic Graph (DAG) so that for every directed edge u → v, node u appears before v. Only possible when the graph has no cycles.',
      how: [
        'Compute the in-degree (number of incoming edges) for every node.',
        'Enqueue all nodes with in-degree 0 — they have no unresolved dependencies.',
        'Dequeue a node and add it to the topological order.',
        'For each of its outgoing edges, decrement the neighbour\'s in-degree; if it reaches 0, enqueue it.',
        'If the final order includes all nodes: success. If not, the graph contains a cycle.'
      ],
      complexity: { time: 'O(V + E)', space: 'O(V)' },
      uses: ['Build systems & dependency resolution (Make, Gradle, npm)', 'Course prerequisite scheduling', 'Instruction scheduling in compilers', 'Spreadsheet formula evaluation order', 'Task pipeline / workflow orchestration', 'Package managers (apt, pip, cargo)'],
      limits: 'Only valid on DAGs — any cycle makes a topological ordering impossible.'
    }
  };

  const style = document.createElement('style');
  style.textContent = `
    .algo-info-card{width:100%;max-width:1100px;background:#0d1220;border:1px solid #1a2a40;border-radius:8px;margin-bottom:12px;overflow:hidden;}
    .algo-info-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:border-color .2s;}
    .algo-info-header:hover{background:rgba(255,255,255,.02);}
    .algo-info-header.open{border-bottom-color:#1a2a40;}
    .algo-info-title{font-family:'Share Tech Mono',monospace;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;}
    .algo-info-year{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:#3a5a7a;margin-left:14px;}
    .algo-info-toggle{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#3a5a7a;white-space:nowrap;transition:color .2s;}
    .algo-info-toggle.open{color:#7ab3ff;}
    .algo-info-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    .algo-info-body.collapsed{display:none;}
    .algo-info-section-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.14em;margin-bottom:7px;opacity:.65;}
    .algo-info-text{font-size:.8rem;color:#8a9abf;line-height:1.68;font-weight:300;}
    .algo-info-steps{list-style:none;padding:0;margin:0;}
    .algo-info-steps li{font-size:.78rem;color:#8a9abf;line-height:1.65;padding:3px 0 3px 18px;position:relative;font-weight:300;}
    .algo-info-steps li::before{content:attr(data-n);position:absolute;left:0;font-family:'Share Tech Mono',monospace;font-size:.6rem;top:6px;opacity:.55;}
    .algo-info-uses{list-style:none;padding:0;margin:0;}
    .algo-info-uses li{font-size:.78rem;color:#8a9abf;line-height:1.65;padding:2px 0 2px 13px;position:relative;font-weight:300;}
    .algo-info-uses li::before{content:'›';position:absolute;left:0;opacity:.5;}
    .algo-complexity{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:.66rem;padding:3px 8px;border-radius:4px;margin:3px 4px 3px 0;background:#060c18;border:1px solid #1a2a40;}
    .algo-info-limit{font-size:.76rem;color:#7a5a4a;line-height:1.65;padding:8px 10px;background:#0e0808;border-radius:5px;border-left:2px solid #5a2a1a;margin-top:8px;font-weight:300;}
    .algo-info-limit::before{content:'⚠  ';font-size:.7rem;opacity:.7;}
    @media(max-width:800px){.algo-info-body{grid-template-columns:1fr;}}
  `;
  document.head.appendChild(style);

  function buildCard(tabId, data) {
    const sec = document.getElementById('sec-' + tabId);
    if (!sec) return;
    const card = document.createElement('div');
    card.className = 'algo-info-card';
    const stepsHTML = data.how.map((s,i)=>`<li data-n="${i+1}.">${s}</li>`).join('');
    const usesHTML  = data.uses.map(u=>`<li>${u}</li>`).join('');
    card.innerHTML = `
      <div class="algo-info-header" id="info-hdr-${tabId}" onclick="toggleInfoCard('${tabId}')">
        <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:0">
          <span class="algo-info-title" style="color:${data.accent}">// ${data.name}</span>
          <span class="algo-info-year">${data.year}</span>
        </div>
        <span class="algo-info-toggle" id="info-tog-${tabId}">▾ show info</span>
      </div>
      <div class="algo-info-body collapsed" id="info-body-${tabId}">
        <div>
          <div class="algo-info-section-title" style="color:${data.accent}">WHAT IT DOES</div>
          <p class="algo-info-text">${data.what}</p>
          <div style="margin-top:10px">
            <div class="algo-info-section-title" style="color:${data.accent}">COMPLEXITY</div>
            <span class="algo-complexity" style="color:${data.accent};border-color:${data.accent}44">⏱ ${data.complexity.time}</span>
            <span class="algo-complexity" style="color:#7a8aaa">💾 ${data.complexity.space}</span>
          </div>
          <div class="algo-info-limit">${data.limits}</div>
        </div>
        <div>
          <div class="algo-info-section-title" style="color:${data.accent}">HOW IT WORKS</div>
          <ol class="algo-info-steps">${stepsHTML}</ol>
        </div>
        <div>
          <div class="algo-info-section-title" style="color:${data.accent}">COMMON USES</div>
          <ul class="algo-info-uses">${usesHTML}</ul>
        </div>
      </div>`;
    sec.insertBefore(card, sec.firstChild);
  }

  window.toggleInfoCard = function(tabId) {
    const body = document.getElementById('info-body-' + tabId);
    const tog  = document.getElementById('info-tog-' + tabId);
    const hdr  = document.getElementById('info-hdr-' + tabId);
    const isOpen = !body.classList.contains('collapsed');
    body.classList.toggle('collapsed', isOpen);
    hdr.classList.toggle('open', !isOpen);
    tog.classList.toggle('open', !isOpen);
    tog.textContent = isOpen ? '▾ show info' : '▴ hide info';
  };

  Object.entries(INFO).forEach(([id, data]) => buildCard(id, data));
})();
</script>
</body>
</html>
